name: Deploy

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Git checkout
        uses: actions/checkout@v4

      - name: Update theme
        run: git submodule update --init --recursive

      - name: Setup hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.4"

      - name: Build
        run: hugo --minify

      - name: Create tarball
        run: tar -czf site.tar.gz public/

      - name: Generate release metadata
        id: meta
        run: |
          echo "tag=build-$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "title=$(date -u +'%-d. %-m. %Y %H:%M:%S')" >> $GITHUB_OUTPUT

          if git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            RANGE="${{ github.event.before }}..${{ github.sha }}"
          else
            RANGE="${{ github.sha }}"
          fi

          NOTES=$(git log "$RANGE" --pretty=format:"- \`%h\` %s (%an)")

          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Publish release
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" site.tar.gz \
            --title "${{ steps.meta.outputs.title }}" \
            --notes "${{ steps.meta.outputs.notes }}"
        env:
          GH_TOKEN: ${{ github.token }}
